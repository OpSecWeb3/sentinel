# ── Production Security Notes ──────────────────────────────────────────────
# Redis: must be password-protected. Use rediss:// (TLS) in REDIS_URL.
# Postgres: use ?sslmode=require in DATABASE_URL for encrypted connections.
# Both services run on the shared-infra network and are NOT defined here.

networks:
  gateway:
    external: true
  shared-infra:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sentinel-api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=4100
    ports:
      - "4100:4100"
    networks:
      - gateway
      - shared-infra
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "1.0"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    networks:
      - shared-infra
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 384M
          cpus: "1.0"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL
    container_name: sentinel-web
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3100
      - HOSTNAME=0.0.0.0
    ports:
      - "3100:3100"
    networks:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
