# ── Production Security Notes ──────────────────────────────────────────────
# Redis: must be password-protected. Use rediss:// (TLS) in REDIS_URL.
# Postgres: use ?sslmode=require in DATABASE_URL for encrypted connections.
# Both services run on the shared-infra network and are NOT defined here.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  gateway:
    external: true
  shared-infra:
    external: true

services:
  # One-shot: `docker compose --profile migrate run --rm --no-deps migrate`
  # (started by deploy.sh; not part of default `up -d`.)
  migrate:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: apps/migrate/Dockerfile
    env_file: .env
    networks:
      - shared-infra
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sentinel-api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=4100
    ports:
      - "4100:4100"
    networks:
      - gateway
      - shared-infra
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "1.0"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    networks:
      - shared-infra
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('fs'); try { const s=fs.statSync('/tmp/.worker-heartbeat'); process.exit(Date.now()-s.mtimeMs<60000?0:1); } catch { process.exit(1); }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 384M
          cpus: "1.0"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL
        - NEXT_PUBLIC_SENTRY_DSN
        - NEXT_PUBLIC_SENTRY_ENVIRONMENT
        - SENTRY_ORG
        - SENTRY_PROJECT
        - SENTRY_AUTH_TOKEN
    container_name: sentinel-web
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3100
      - HOSTNAME=0.0.0.0
    ports:
      - "3100:3100"
    networks:
      - gateway
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
