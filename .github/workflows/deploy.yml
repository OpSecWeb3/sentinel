name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    # TEMP: skip full CI so deploy runs immediately. Remove `if: false` and
    # restore `needs: ci` on deploy when you want the gate back.
    if: false
    uses: ./.github/workflows/ci.yml

  deploy:
    # needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch secrets from SSM and build .env
        run: |
          fetch_param() {
            local name="$1"
            local default="${2:-}"
            local value
            if ! value=$(aws ssm get-parameter --name "$name" --with-decryption --query 'Parameter.Value' --output text 2>&1); then
              if [ -n "$default" ]; then
                echo "$default"
              else
                echo "::notice::SSM param not found: ${name}" >&2
                echo ""
              fi
              return
            fi
            echo "$value"
          }

          # Required secrets
          DATABASE_URL=$(fetch_param /sentinel/production/DATABASE_URL)
          SESSION_SECRET=$(fetch_param /sentinel/production/SESSION_SECRET)
          ENCRYPTION_KEY=$(fetch_param /sentinel/production/ENCRYPTION_KEY)
          ENCRYPTION_KEY_PREV=$(fetch_param /sentinel/production/ENCRYPTION_KEY_PREV)
          ALLOWED_ORIGINS=$(fetch_param /sentinel/production/ALLOWED_ORIGINS)
          NEXT_PUBLIC_API_URL=$(fetch_param /sentinel/production/NEXT_PUBLIC_API_URL)
          REDIS_PASSWORD=$(fetch_param /shared/production/REDIS_PASSWORD)
          TRUSTED_PROXY_COUNT=$(fetch_param /sentinel/production/TRUSTED_PROXY_COUNT)

          # AWS cross-account role assumption — use prefixed names to avoid
          # clobbering the runner's OIDC credentials mid-script.
          SENTINEL_AWS_ACCESS_KEY_ID=$(fetch_param /sentinel/production/AWS_ACCESS_KEY_ID)
          SENTINEL_AWS_SECRET_ACCESS_KEY=$(fetch_param /sentinel/production/AWS_SECRET_ACCESS_KEY)
          SENTINEL_AWS_ROLE_ARN=$(fetch_param /sentinel/production/AWS_SENTINEL_ROLE_ARN)

          # Optional secrets
          SLACK_CLIENT_ID=$(fetch_param /sentinel/production/SLACK_CLIENT_ID)
          SLACK_CLIENT_SECRET=$(fetch_param /sentinel/production/SLACK_CLIENT_SECRET)
          GITHUB_APP_ID=$(fetch_param /sentinel/production/GITHUB_APP_ID)
          GITHUB_APP_PRIVATE_KEY=$(fetch_param /sentinel/production/GITHUB_APP_PRIVATE_KEY)
          GITHUB_APP_WEBHOOK_SECRET=$(fetch_param /sentinel/production/GITHUB_APP_WEBHOOK_SECRET)
          GITHUB_APP_CLIENT_ID=$(fetch_param /sentinel/production/GITHUB_APP_CLIENT_ID)
          GITHUB_APP_CLIENT_SECRET=$(fetch_param /sentinel/production/GITHUB_APP_CLIENT_SECRET)
          GITHUB_APP_SLUG=$(fetch_param /sentinel/production/GITHUB_APP_SLUG)
          GITHUB_TOKEN=$(fetch_param /sentinel/production/GITHUB_TOKEN)
          SMTP_URL=$(fetch_param /sentinel/production/SMTP_URL)
          SMTP_FROM=$(fetch_param /sentinel/production/SMTP_FROM "alerts@sentinel.dev")
          SENTRY_DSN=$(fetch_param /sentinel/production/SENTRY_DSN)
          SENTRY_ENVIRONMENT=$(fetch_param /sentinel/production/SENTRY_ENVIRONMENT "production")
          SENTRY_ORG=$(fetch_param /sentinel/production/SENTRY_ORG)
          SENTRY_PROJECT=$(fetch_param /sentinel/production/SENTRY_PROJECT)
          SENTRY_AUTH_TOKEN=$(fetch_param /sentinel/production/SENTRY_AUTH_TOKEN)
          ETHERSCAN_API_KEY=$(fetch_param /sentinel/production/ETHERSCAN_API_KEY)
          RPC_ETHEREUM=$(fetch_param /sentinel/production/RPC_ETHEREUM)
          METRICS_TOKEN=$(fetch_param /sentinel/production/METRICS_TOKEN)

          printf 'NODE_ENV=production\nPORT=4100\n' > /tmp/sentinel.env

          # Append secrets (using printf to handle multi-line values like PEM keys)
          # Note: [ -n ] && printf returns exit code 1 when the var is empty,
          # which kills the script under bash -e. Append || true to optional lines.
          # Single-quote all values so `source .env` in deploy.sh
          # doesn't try to interpret special chars (e.g. PEM keys).
          sq() { printf "%s='%s'\n" "$1" "${2//\'/\'\\\'\'}"; }
          {
            sq DATABASE_URL "$DATABASE_URL"
            sq REDIS_URL "redis://:${REDIS_PASSWORD}@redis:6379"
            sq TRUSTED_PROXY_COUNT "$TRUSTED_PROXY_COUNT"
            sq SESSION_SECRET "$SESSION_SECRET"
            sq ENCRYPTION_KEY "$ENCRYPTION_KEY"
            [ -n "$ENCRYPTION_KEY_PREV" ] && sq ENCRYPTION_KEY_PREV "$ENCRYPTION_KEY_PREV" || true
            sq ALLOWED_ORIGINS "$ALLOWED_ORIGINS"
            sq NEXT_PUBLIC_API_URL "$NEXT_PUBLIC_API_URL"
            sq API_BASE_URL "$NEXT_PUBLIC_API_URL"
            [ -n "$SENTINEL_AWS_ACCESS_KEY_ID" ] && sq AWS_ACCESS_KEY_ID "$SENTINEL_AWS_ACCESS_KEY_ID" || true
            [ -n "$SENTINEL_AWS_SECRET_ACCESS_KEY" ] && sq AWS_SECRET_ACCESS_KEY "$SENTINEL_AWS_SECRET_ACCESS_KEY" || true
            [ -n "$SENTINEL_AWS_ROLE_ARN" ] && sq AWS_SENTINEL_ROLE_ARN "$SENTINEL_AWS_ROLE_ARN" || true
            sq SLACK_CLIENT_ID "$SLACK_CLIENT_ID"
            sq SLACK_CLIENT_SECRET "$SLACK_CLIENT_SECRET"
            sq GITHUB_APP_ID "$GITHUB_APP_ID"
            sq GITHUB_APP_PRIVATE_KEY "${GITHUB_APP_PRIVATE_KEY//$'\n'/\\n}"
            sq GITHUB_APP_WEBHOOK_SECRET "$GITHUB_APP_WEBHOOK_SECRET"
            sq GITHUB_APP_CLIENT_ID "$GITHUB_APP_CLIENT_ID"
            sq GITHUB_APP_CLIENT_SECRET "$GITHUB_APP_CLIENT_SECRET"
            sq GITHUB_APP_SLUG "$GITHUB_APP_SLUG"
            sq GITHUB_TOKEN "$GITHUB_TOKEN"
            sq SMTP_URL "$SMTP_URL"
            sq SMTP_FROM "$SMTP_FROM"
            sq SENTRY_DSN "$SENTRY_DSN"
            sq SENTRY_ENVIRONMENT "$SENTRY_ENVIRONMENT"
            [ -n "$SENTRY_DSN" ] && sq NEXT_PUBLIC_SENTRY_DSN "$SENTRY_DSN" || true
            sq NEXT_PUBLIC_SENTRY_ENVIRONMENT "$SENTRY_ENVIRONMENT"
            [ -n "$SENTRY_ORG" ] && sq SENTRY_ORG "$SENTRY_ORG" || true
            [ -n "$SENTRY_PROJECT" ] && sq SENTRY_PROJECT "$SENTRY_PROJECT" || true
            [ -n "$SENTRY_AUTH_TOKEN" ] && sq SENTRY_AUTH_TOKEN "$SENTRY_AUTH_TOKEN" || true
            sq ETHERSCAN_API_KEY "$ETHERSCAN_API_KEY"
            sq RPC_ETHEREUM "$RPC_ETHEREUM"
            [ -n "$METRICS_TOKEN" ] && sq METRICS_TOKEN "$METRICS_TOKEN" || true
          } >> /tmp/sentinel.env

          # Validate required SSM parameters before SCP
          MISSING=""
          check_var() { eval "val=\$$1"; [ -z "$val" ] && MISSING="$MISSING $1($2)" || true; }
          check_var DATABASE_URL        /sentinel/production/DATABASE_URL
          check_var SESSION_SECRET      /sentinel/production/SESSION_SECRET
          check_var ENCRYPTION_KEY      /sentinel/production/ENCRYPTION_KEY
          check_var ALLOWED_ORIGINS     /sentinel/production/ALLOWED_ORIGINS
          check_var NEXT_PUBLIC_API_URL /sentinel/production/NEXT_PUBLIC_API_URL
          check_var REDIS_PASSWORD      /shared/production/REDIS_PASSWORD
          check_var TRUSTED_PROXY_COUNT /sentinel/production/TRUSTED_PROXY_COUNT
          if [ -n "$MISSING" ]; then
            echo "::error::Required SSM parameters are empty — check that these paths exist and the OIDC role can read them:$MISSING"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure repo is cloned on server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} "
            if [ ! -d /opt/sentinel/.git ]; then
              mkdir -p /opt/sentinel
              git clone 'https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git' /opt/sentinel
            fi
          "

      - name: Copy .env to server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          scp -i ~/.ssh/deploy_key /tmp/sentinel.env ${USER}@${HOST}:/opt/sentinel/.env
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} "chmod 600 /opt/sentinel/.env"

      - name: Deploy to Hetzner
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} "
            cd /opt/sentinel
            git remote set-url origin 'https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git'
            trap 'git remote set-url origin https://github.com/${REPO}.git' EXIT
            PREV_SHA=\$(git rev-parse HEAD)
            git pull origin main
            export DEPLOY_PREV_SHA=\"\$PREV_SHA\"
            bash scripts/deploy.sh
          "

      - name: External smoke check
        run: |
          set -euo pipefail
          # SecureString params need --with-decryption; otherwise Value is ciphertext (garbled).
          API_URL=$(aws ssm get-parameter --name /sentinel/production/NEXT_PUBLIC_API_URL --with-decryption --query 'Parameter.Value' --output text | tr -d '\r\n')
          if [[ ! "${API_URL}" =~ ^https?:// ]]; then
            echo "::error::NEXT_PUBLIC_API_URL from SSM is not an http(s) URL (check parameter type and --with-decryption)"
            exit 1
          fi
          echo "Smoke check: ${API_URL}/health"
          for i in {1..10}; do
            if curl -fsS --max-time 8 "${API_URL}/health" >/tmp/api-health.json; then
              echo "API reachable from runner"
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 3
          done
          echo "::error::External smoke check failed for ${API_URL}/health"
          exit 1

      - name: Collect logs on failure
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} \
            "cd /opt/sentinel && docker compose -f docker-compose.prod.yml logs --tail=100" || true
