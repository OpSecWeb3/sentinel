name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch secrets from SSM and build .env
        run: |
          fetch_param() {
            local name="$1"
            local default="${2:-}"
            local value
            value=$(aws ssm get-parameter --name "$name" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null) || value="$default"
            echo "$value"
          }

          # Required secrets
          DATABASE_URL=$(fetch_param /sentinel/production/DATABASE_URL)
          SESSION_SECRET=$(fetch_param /sentinel/production/SESSION_SECRET)
          ENCRYPTION_KEY=$(fetch_param /sentinel/production/ENCRYPTION_KEY)
          ENCRYPTION_KEY_PREV=$(fetch_param /sentinel/production/ENCRYPTION_KEY_PREV)
          ALLOWED_ORIGINS=$(fetch_param /sentinel/production/ALLOWED_ORIGINS)
          NEXT_PUBLIC_API_URL=$(fetch_param /sentinel/production/NEXT_PUBLIC_API_URL)
          REDIS_PASSWORD=$(fetch_param /shared/production/REDIS_PASSWORD)
          TRUSTED_PROXY_COUNT=$(fetch_param /sentinel/production/TRUSTED_PROXY_COUNT)

          # AWS cross-account role assumption
          AWS_ACCESS_KEY_ID=$(fetch_param /sentinel/production/AWS_ACCESS_KEY_ID)
          AWS_SECRET_ACCESS_KEY=$(fetch_param /sentinel/production/AWS_SECRET_ACCESS_KEY)
          AWS_SENTINEL_ROLE_ARN=$(fetch_param /sentinel/production/AWS_SENTINEL_ROLE_ARN)

          # Optional secrets
          SLACK_CLIENT_ID=$(fetch_param /sentinel/production/SLACK_CLIENT_ID)
          SLACK_CLIENT_SECRET=$(fetch_param /sentinel/production/SLACK_CLIENT_SECRET)
          GITHUB_APP_ID=$(fetch_param /sentinel/production/GITHUB_APP_ID)
          GITHUB_APP_PRIVATE_KEY=$(fetch_param /sentinel/production/GITHUB_APP_PRIVATE_KEY)
          GITHUB_APP_WEBHOOK_SECRET=$(fetch_param /sentinel/production/GITHUB_APP_WEBHOOK_SECRET)
          GITHUB_APP_CLIENT_ID=$(fetch_param /sentinel/production/GITHUB_APP_CLIENT_ID)
          GITHUB_APP_CLIENT_SECRET=$(fetch_param /sentinel/production/GITHUB_APP_CLIENT_SECRET)
          GITHUB_APP_SLUG=$(fetch_param /sentinel/production/GITHUB_APP_SLUG)
          GITHUB_TOKEN=$(fetch_param /sentinel/production/GITHUB_TOKEN)
          SMTP_URL=$(fetch_param /sentinel/production/SMTP_URL)
          SMTP_FROM=$(fetch_param /sentinel/production/SMTP_FROM "alerts@sentinel.dev")
          SENTRY_DSN=$(fetch_param /sentinel/production/SENTRY_DSN)
          SENTRY_ENVIRONMENT=$(fetch_param /sentinel/production/SENTRY_ENVIRONMENT "production")
          SENTRY_ORG=$(fetch_param /sentinel/production/SENTRY_ORG)
          SENTRY_PROJECT=$(fetch_param /sentinel/production/SENTRY_PROJECT)
          SENTRY_AUTH_TOKEN=$(fetch_param /sentinel/production/SENTRY_AUTH_TOKEN)
          ETHERSCAN_API_KEY=$(fetch_param /sentinel/production/ETHERSCAN_API_KEY)
          RPC_ETHEREUM=$(fetch_param /sentinel/production/RPC_ETHEREUM)
          METRICS_TOKEN=$(fetch_param /sentinel/production/METRICS_TOKEN)

          printf 'NODE_ENV=production\nPORT=4100\n' > /tmp/sentinel.env

          # Append secrets (using printf to handle multi-line values like PEM keys)
          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'REDIS_URL=redis://:%s@redis:6379\n' "$REDIS_PASSWORD"
            printf 'TRUSTED_PROXY_COUNT=%s\n' "$TRUSTED_PROXY_COUNT"
            printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET"
            printf 'ENCRYPTION_KEY=%s\n' "$ENCRYPTION_KEY"
            [ -n "$ENCRYPTION_KEY_PREV" ] && printf 'ENCRYPTION_KEY_PREV=%s\n' "$ENCRYPTION_KEY_PREV"
            printf 'ALLOWED_ORIGINS=%s\n' "$ALLOWED_ORIGINS"
            printf 'NEXT_PUBLIC_API_URL=%s\n' "$NEXT_PUBLIC_API_URL"
            printf 'API_BASE_URL=%s\n' "$NEXT_PUBLIC_API_URL"
            [ -n "$AWS_ACCESS_KEY_ID" ] && printf 'AWS_ACCESS_KEY_ID=%s\n' "$AWS_ACCESS_KEY_ID"
            [ -n "$AWS_SECRET_ACCESS_KEY" ] && printf 'AWS_SECRET_ACCESS_KEY=%s\n' "$AWS_SECRET_ACCESS_KEY"
            [ -n "$AWS_SENTINEL_ROLE_ARN" ] && printf 'AWS_SENTINEL_ROLE_ARN=%s\n' "$AWS_SENTINEL_ROLE_ARN"
            printf 'SLACK_CLIENT_ID=%s\n' "$SLACK_CLIENT_ID"
            printf 'SLACK_CLIENT_SECRET=%s\n' "$SLACK_CLIENT_SECRET"
            printf 'GITHUB_APP_ID=%s\n' "$GITHUB_APP_ID"
            printf 'GITHUB_APP_PRIVATE_KEY=%s\n' "${GITHUB_APP_PRIVATE_KEY//$'\n'/\\n}"
            printf 'GITHUB_APP_WEBHOOK_SECRET=%s\n' "$GITHUB_APP_WEBHOOK_SECRET"
            printf 'GITHUB_APP_CLIENT_ID=%s\n' "$GITHUB_APP_CLIENT_ID"
            printf 'GITHUB_APP_CLIENT_SECRET=%s\n' "$GITHUB_APP_CLIENT_SECRET"
            printf 'GITHUB_APP_SLUG=%s\n' "$GITHUB_APP_SLUG"
            printf 'GITHUB_TOKEN=%s\n' "$GITHUB_TOKEN"
            printf 'SMTP_URL=%s\n' "$SMTP_URL"
            printf 'SMTP_FROM=%s\n' "$SMTP_FROM"
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN"
            printf 'SENTRY_ENVIRONMENT=%s\n' "$SENTRY_ENVIRONMENT"
            # Same Sentry project as the API/worker; browser bundle requires NEXT_PUBLIC_*.
            [ -n "$SENTRY_DSN" ] && printf 'NEXT_PUBLIC_SENTRY_DSN=%s\n' "$SENTRY_DSN"
            printf 'NEXT_PUBLIC_SENTRY_ENVIRONMENT=%s\n' "$SENTRY_ENVIRONMENT"
            [ -n "$SENTRY_ORG" ] && printf 'SENTRY_ORG=%s\n' "$SENTRY_ORG"
            [ -n "$SENTRY_PROJECT" ] && printf 'SENTRY_PROJECT=%s\n' "$SENTRY_PROJECT"
            [ -n "$SENTRY_AUTH_TOKEN" ] && printf 'SENTRY_AUTH_TOKEN=%s\n' "$SENTRY_AUTH_TOKEN"
            printf 'ETHERSCAN_API_KEY=%s\n' "$ETHERSCAN_API_KEY"
            printf 'RPC_ETHEREUM=%s\n' "$RPC_ETHEREUM"
            [ -n "$METRICS_TOKEN" ] && printf 'METRICS_TOKEN=%s\n' "$METRICS_TOKEN"
          } >> /tmp/sentinel.env

          # Validate required SSM parameters before SCP
          REQUIRED_VARS="DATABASE_URL SESSION_SECRET ENCRYPTION_KEY ALLOWED_ORIGINS NEXT_PUBLIC_API_URL REDIS_PASSWORD TRUSTED_PROXY_COUNT"
          MISSING=""
          for var in $REQUIRED_VARS; do
            eval "val=\$$var"
            if [ -z "$val" ]; then
              MISSING="$MISSING $var"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Required SSM parameters are empty:$MISSING"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure repo is cloned on server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} "
            if [ ! -d /opt/sentinel/.git ]; then
              sudo mkdir -p /opt/sentinel
              sudo chown \$USER:\$USER /opt/sentinel
              git clone 'https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git' /opt/sentinel
            fi
          "

      - name: Copy .env to server
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          scp -i ~/.ssh/deploy_key /tmp/sentinel.env ${USER}@${HOST}:/opt/sentinel/.env
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} "chmod 600 /opt/sentinel/.env"

      - name: Deploy to Hetzner
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} "
            cd /opt/sentinel
            git remote set-url origin 'https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git'
            trap 'git remote set-url origin https://github.com/${REPO}.git' EXIT
            bash scripts/deploy.sh
          "

      - name: External smoke check
        run: |
          set -euo pipefail
          API_URL=$(aws ssm get-parameter --name /sentinel/production/NEXT_PUBLIC_API_URL --query 'Parameter.Value' --output text)
          for i in {1..10}; do
            if curl -fsS --max-time 8 "${API_URL}/health" >/tmp/api-health.json; then
              echo "API reachable from runner"
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 3
          done
          echo "::error::External smoke check failed for ${API_URL}/health"
          exit 1

      - name: Collect logs on failure
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${USER}@${HOST} \
            "cd /opt/sentinel && docker compose -f docker-compose.prod.yml logs --tail=100" || true
