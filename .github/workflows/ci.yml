name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run repository scan
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact

  dependency-audit:
    name: Dependency Audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Trivy
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy filesystem scan
        run: trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 .

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          # NEXT_PUBLIC_* vars are baked in at build time — placeholder is fine for a build check
          NEXT_PUBLIC_API_URL: http://localhost:4000

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Three-way migration sync check
        run: |
          # Count only Drizzle migration SQL files (digits_description.sql), not other .sql in this folder
          shopt -s nullglob
          migration_sql=(packages/db/migrations/[0-9]*_*.sql)
          SQL_COUNT=${#migration_sql[@]}
          JOURNAL_COUNT=$(grep -c '"tag"' packages/db/migrations/meta/_journal.json || echo 0)
          DB_COUNT=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM drizzle.__drizzle_migrations;")

          echo "SQL files: $SQL_COUNT | Journal entries: $JOURNAL_COUNT | DB rows: $DB_COUNT"

          if [ "$SQL_COUNT" != "$JOURNAL_COUNT" ]; then
            echo "::error::Migration file count ($SQL_COUNT) does not match journal entries ($JOURNAL_COUNT). A migration file may be missing from _journal.json."
            exit 1
          fi

          if [ "$JOURNAL_COUNT" != "$DB_COUNT" ]; then
            echo "::error::Journal entries ($JOURNAL_COUNT) do not match applied migrations ($DB_COUNT). Run 'pnpm db:migrate' and check for unapplied migrations."
            exit 1
          fi

      - name: Check for uncommitted schema drift
        run: |
          # Timeout protects against interactive prompts hanging CI
          timeout 30 pnpm db:generate || {
            echo "::error::pnpm db:generate timed out or failed. If it needs interactive input, the schema change may require a manual migration."
            exit 1
          }
          if [ -n "$(git status --porcelain packages/db/migrations/)" ]; then
            echo "::error::Schema changes detected without a migration file. Run 'pnpm db:generate' and commit the result."
            git diff packages/db/migrations/
            exit 1
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test

      - name: Unit tests
        run: pnpm test:unit -- --coverage

      - name: Integration tests
        run: pnpm test:integration -- --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test
          REDIS_URL: redis://localhost:6379/1
          SESSION_SECRET: test-session-secret-at-least-32-chars-long!!
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          ALLOWED_ORIGINS: http://localhost:3000
          API_BASE_URL: http://localhost:4000
          SMTP_FROM: test@sentinel.dev
          SMTP_URL: "smtp://localhost:1025"
          DISABLE_RATE_LIMIT: "true"
